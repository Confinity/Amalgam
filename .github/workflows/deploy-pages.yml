name: Deploy Public Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "public-site-deploy"
  cancel-in-progress: true

env:
  PUBLIC_SITE_REPOSITORY: Confinity/Amalgam

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          SITE_REPOSITORY: ${{ env.PUBLIC_SITE_REPOSITORY }}
        run: pnpm build

      - name: Publish static files to public repo
        env:
          DEPLOY_TOKEN: ${{ secrets.PUBLIC_SITE_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_TOKEN}" ]; then
            echo "PUBLIC_SITE_DEPLOY_TOKEN is not set."
            exit 1
          fi

          TARGET_DIR="${RUNNER_TEMP}/public-site"
          git clone "https://x-access-token:${DEPLOY_TOKEN}@github.com/${PUBLIC_SITE_REPOSITORY}.git" "${TARGET_DIR}"

          find "${TARGET_DIR}" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R out/. "${TARGET_DIR}/"
          touch "${TARGET_DIR}/.nojekyll"

          cd "${TARGET_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No deploy changes detected."
            exit 0
          fi

          git add -A
          git commit -m "Deploy site from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin main
