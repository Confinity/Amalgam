name: CI Health

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Report trigger context
        run: |
          echo "Public repo CI healthcheck reached a running job."
          echo "repository=${GITHUB_REPOSITORY}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
